name: growth_curves_app_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - plotly
  - streamlit
  - openpyxl # .xlsx support
  - xlrd # .xls support (legacy)
  - growthcurves
  - pip:
      - kaleido
      - streamlit-plotly-events
      - streamlit-sortables
      - streamlit-aggrid
