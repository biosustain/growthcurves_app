<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Simple Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
      line-height: 1.5;
    }

    p {
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-block;
      padding: 12px 20px;
      text-decoration: none;
      border: 1px solid #333;
      border-radius: 8px;
      color: #333;
    }

    a.button:hover {
      background: #f3f3f3;
    }
  </style>
</head>
<body>
  <h1>Welcome</h1>
  <p>
    This website explains what this project is about and gives you two useful links.
  </p>

  <div class="buttons">
    <a class="button" href="https://example.com" target="_blank" rel="noopener noreferrer">
      First Link
    </a>
    <a class="button" href="https://example.org" target="_blank" rel="noopener noreferrer">
      Second Link
    </a>
  </div>
</body>
</html>
